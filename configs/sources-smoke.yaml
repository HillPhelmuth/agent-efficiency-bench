# Minimal smoke subset definition for first-time validation.
# One task per configured source keeps subset generation and fake-provider runs cheap.
sources:
  - name: swe_bench_lite
    type: huggingface
    dataset_id: SWE-bench/SWE-bench_Lite
    split: test
    sample_size: 1
    normalizer: swe_bench

  - name: assistantbench_dev
    type: huggingface_jsonl
    dataset_id: AssistantBench/AssistantBench
    url: https://huggingface.co/datasets/AssistantBench/AssistantBench/resolve/main/assistant_bench_v1.0_dev.jsonl
    split: dev
    sample_size: 1
    normalizer: assistantbench

  - name: terminal_bench_github
    type: github_terminal_bench
    repo: harbor-framework/terminal-bench
    branch: main
    sample_size: 1
    normalizer: terminal_bench

  - name: tau2_bench_retail
    type: github_tau2_bench
    repo: sierra-research/tau2-bench
    branch: main
    domain: retail
    sample_size: 1
    normalizer: tau2_bench

  - name: tau2_bench_airline
    type: github_tau2_bench
    repo: sierra-research/tau2-bench
    branch: main
    domain: airline
    sample_size: 1
    normalizer: tau2_bench